  <style>
    body {
      background-color: #100C09;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #281E15 0%, #100C09 100%);
      z-index: 9999;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #loading-container.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-title {
      color: #FFFFFF;
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0px #000000;
      border: 3px solid #000000;
      background-color: #1A1410;
      padding: 10px 20px;
      border-radius: 12px;
      box-shadow: 4px 4px 0px #000000;
    }

    /* Lotto Balls Mixing Animation */
    .balls-mixer {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #000000;
      background: rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6), 4px 4px 0px #000000;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .lotto-ball {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 9px;
      font-weight: 900;
      color: #000000;
      box-sizing: border-box;
      box-shadow: inset -3px -3px 0px rgba(0, 0, 0, 0.15);
    }

    .ball-1 {
      background-color: #FBC400;
      top: 70px;
      left: 20px;
      animation: mix-1 1.8s infinite ease-in-out;
    }

    .ball-2 {
      background-color: #69C8F2;
      top: 40px;
      left: 70px;
      animation: mix-2 2.1s infinite ease-in-out;
    }

    .ball-3 {
      background-color: #FF7272;
      top: 80px;
      left: 60px;
      animation: mix-3 1.9s infinite ease-in-out;
    }

    .ball-4 {
      background-color: #AAAAAA;
      top: 20px;
      left: 30px;
      animation: mix-4 2.3s infinite ease-in-out;
    }

    .ball-5 {
      background-color: #B0D840;
      top: 50px;
      left: 50px;
      animation: mix-5 2.0s infinite ease-in-out;
    }

    @keyframes mix-1 {

      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      33% {
        transform: translate(40px, -40px) rotate(120deg);
      }

      66% {
        transform: translate(15px, -60px) rotate(240deg);
      }
    }

    @keyframes mix-2 {

      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      25% {
        transform: translate(-30px, 30px) rotate(-90deg);
      }

      70% {
        transform: translate(-50px, -10px) rotate(-270deg);
      }
    }

    @keyframes mix-3 {

      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      40% {
        transform: translate(-40px, -45px) rotate(180deg);
      }

      80% {
        transform: translate(-10px, -30px) rotate(360deg);
      }
    }

    @keyframes mix-4 {

      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      30% {
        transform: translate(50px, 40px) rotate(150deg);
      }

      60% {
        transform: translate(20px, 70px) rotate(300deg);
      }
    }

    @keyframes mix-5 {

      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      35% {
        transform: translate(-20px, 20px) rotate(100deg);
      }

      75% {
        transform: translate(30px, -20px) rotate(260deg);
      }
    }

    .progress-container {
      width: 200px;
      height: 12px;
      border: 3px solid #000000;
      background-color: #1A1410;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      box-shadow: 2px 2px 0px #000000;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: #00BFA5;
      border-right: 3px solid #000000;
      transition: width 0.3s ease;
    }

    .loading-status {
      margin-top: 12px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
  </style>

<body>
  <div id="loading-container">
    <div class="loader-title">Lotto 6/45 Simulation</div>
    <div class="balls-mixer">
      <div class="lotto-ball ball-1">7</div>
      <div class="lotto-ball ball-2">18</div>
      <div class="lotto-ball ball-3">22</div>
      <div class="lotto-ball ball-4">35</div>
      <div class="lotto-ball ball-5">41</div>
    </div>
    <div class="progress-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
    <div id="loading-status" class="loading-status">Wasm Engine Loading (0%)</div>
  </div>

  <script>
    (function () {
      var progress = 0;
      var progressBar = document.getElementById('progress-bar');
      var statusText = document.getElementById('loading-status');

      var interval = setInterval(function () {
        if (progress < 90) {
          progress += Math.random() * 8;
          if (progress > 90) progress = 90;
          updateProgress(progress);
        }
      }, 200);

      function updateProgress(value) {
        var rounded = Math.round(value);
        if (progressBar) progressBar.style.width = rounded + '%';
        if (statusText) statusText.innerText = 'Wasm Engine Loading (' + rounded + '%)';
      }

      window.addEventListener('flutter-first-frame', function () {
        clearInterval(interval);
        updateProgress(100);
        setTimeout(function () {
          var container = document.getElementById('loading-container');
          if (container) {
            container.classList.add('fade-out');
            setTimeout(function () {
              container.remove();
            }, 500);
          }
        }, 200);
      });
    })();
  </script>
